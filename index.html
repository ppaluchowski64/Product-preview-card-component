<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">

		<link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
		<link rel="stylesheet" type="text/css" href="style.css">

		<title>Frontend Mentor | Product preview card component</title>
	</head>

	<!-- pusty div do layoutu flexboxa -->
	<div></div>

	<body>
		<div class="card">
			<div class="image">
				<img src="images/image-product-desktop.jpg">
			</div>

			<div class="text">
				<span>Perfume</span>

				<span>Gabrielle Essence Eau De Parfum</span>

				<span>A floral, solar and voluptuous interpretation composed by Olivier Polge, Perfumer-Creator for the House of CHANEL.</span>

				<div class="price">
					<span>$149.99</span>
					<span>$169.99</span>
				</div>

				<button>
					<img src="images/icon-cart.svg">
					<span>Add to Cart</span>
				</button>
			</div>
		</div>
		
		<footer class="attribution">
			Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
			Coded by <a href="#">Paweł Paluchowski</a>.
		</footer>
	</body>
</html>
